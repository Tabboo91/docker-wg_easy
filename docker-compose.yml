version: "3"
services:

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy
    container_name: wg-easy
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - LANG=es #Idioma poratl web de gestión
      - PASSWORD_HASH=$$2a$$12$$XhnO0qSdF1Xwjs/O7w00qOf9ONEgJ9/hlVUc3wKCOk3bKHuU0d1Ne #Contraseña
      - WG_DEFAULT_DNS=1.1.1.1 #IP DNS
      - WG_HOST=TabbooNAS.myqnapcloud.com #IP ó Nombre DNS
      - WG_PORT=51830 #Puerto WireGuard
    ports:
      - 51830:51820/udp #Puerto Wireguard
      - 51831:51821/tcp #Puerto Gestión usuarios - UI
    restart: unless-stopped
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    volumes:
      - ./wireguard:/etc/wireguard
